services:
  postgres:
    image: postgres:16-alpine
    container_name: pesantren-hris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hris_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hris_password}
      POSTGRES_DB: ${POSTGRES_DB:-pesantren_hris}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hris_user} -d ${POSTGRES_DB:-pesantren_hris}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
